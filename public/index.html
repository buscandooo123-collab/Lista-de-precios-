<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Catálogo de productos y lista de precios"/>
<title>Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2f6b4f; --green-d:#1d4a35; --green-l:#e4f0e9;
  --terra:#c8622a; --terra-l:#f5e8df;
  --cream:#faf8f3; --warm:#f2ede3; --surface:#fff;
  --border:#e6dfd2; --text:#1e1a14; --muted:#8a8070;
  --shadow:rgba(30,26,20,.07);
  --radius:16px;
}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* HERO */
.hero{
  background:linear-gradient(145deg,var(--green-d) 0%,var(--green) 100%);
  padding:4rem 1.5rem 0;text-align:center;position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);border-radius:50px;padding:.32rem 1rem;font-size:.73rem;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:1.3rem;position:relative;z-index:1;animation:fadeUp .6s ease both}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,8vw,4.2rem);font-weight:700;color:#fff;line-height:1.08;position:relative;z-index:1;animation:fadeUp .6s .08s ease both}
.hero-title em{font-style:italic;color:rgba(255,255,255,.7)}
.hero-subtitle{color:rgba(255,255,255,.62);font-size:.92rem;margin-top:.8rem;position:relative;z-index:1;animation:fadeUp .6s .16s ease both}
.hero-wave{height:56px;background:var(--cream);clip-path:ellipse(55% 100% at 50% 100%)}

/* BODY */
.body{max-width:720px;margin:0 auto;padding:1.8rem 1.2rem 6rem}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:1.6rem;animation:fadeUp .5s .2s ease both}
.search-wrap svg{position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;padding:.85rem 1.2rem .85rem 3rem;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;box-shadow:0 2px 12px var(--shadow)}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(47,107,79,.1)}
.search-input::placeholder{color:#ccc}

/* CATEGORIES */
.cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:2rem;animation:fadeUp .5s .26s ease both}
.cat{padding:.38rem 1rem;border-radius:50px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.cat:hover{border-color:var(--green);color:var(--green)}
.cat.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}

/* SECTION */
.section-head{display:flex;align-items:center;gap:12px;margin:2.4rem 0 1.1rem}
.section-head:first-of-type{margin-top:0}
.section-head h2{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}

/* GRID */
.grid{display:grid;gap:10px}
.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.3rem;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 2px 10px var(--shadow);transition:transform .18s,box-shadow .18s;animation:fadeUp .4s ease both}
.item:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--shadow)}
.item-left{flex:1;min-width:0}
.item-name{font-weight:600;font-size:.96rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-desc{color:var(--muted);font-size:.76rem;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--terra);white-space:nowrap;flex-shrink:0}
.item-cur{font-size:.68rem;color:var(--muted);font-family:'DM Sans',sans-serif;margin-left:2px}

/* STATES */
.empty{text-align:center;padding:5rem 1rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:.8rem}
.loading{text-align:center;padding:4rem;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* FOOTER */
footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.76rem;border-top:1px solid var(--border);margin-top:2rem}
footer strong{color:var(--green)}
.admin-btn{display:inline-flex;align-items:center;gap:5px;margin-top:.7rem;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:.32rem .9rem;font-size:.74rem;color:var(--muted);cursor:pointer;transition:all .18s;text-decoration:none}
.admin-btn:hover{border-color:var(--green);color:var(--green)}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge" id="hero-badge">🏷 Catálogo</div>
  <h1 class="hero-title" id="hero-title">Lista de <em>Precios</em></h1>
  <p class="hero-subtitle" id="hero-subtitle">Precios actualizados</p>
  <div class="hero-wave"></div>
</div>

<div class="body">
  <div class="search-wrap">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search" placeholder="Buscar producto..." oninput="applyFilter()"/>
  </div>
  <div class="cats" id="cats"></div>
  <div id="catalog">
    <div class="loading"><div class="spinner"></div>Cargando productos…</div>
  </div>

  <footer>
    <p>Precios sujetos a cambios · <strong id="footer-biz">Mi Negocio</strong></p>
    <a class="admin-btn" href="/admin">⚙️ Administrar</a>
  </footer>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "/assets/firebase-config.js";

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── STATE ──────────────────────────────────────────────────────────────────
let allProducts = [];
let config      = { biz:'Mi Negocio', subtitle:'Precios actualizados', badge:'Catálogo de productos', currency:'MXN' };
let activeCat   = 'all';

// ── REALTIME: config ───────────────────────────────────────────────────────
onSnapshot(collection(db,'config'), snap => {
  snap.forEach(doc => {
    if (doc.id === 'main') Object.assign(config, doc.data());
  });
  applyConfig();
});

// ── REALTIME: products ─────────────────────────────────────────────────────
const q = query(collection(db,'products'), orderBy('order','asc'));
onSnapshot(q, snap => {
  allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  buildCats();
  applyFilter();
});

// ── CONFIG ─────────────────────────────────────────────────────────────────
function applyConfig() {
  document.title = config.biz || 'Catálogo';
  document.getElementById('hero-title').innerHTML = (config.biz || 'Lista de') + ' <em>Precios</em>';
  document.getElementById('hero-subtitle').textContent = config.subtitle || '';
  document.getElementById('hero-badge').textContent = '🏷 ' + (config.badge || 'Catálogo');
  document.getElementById('footer-biz').textContent = config.biz || 'Mi Negocio';
}

// ── CATEGORIES ─────────────────────────────────────────────────────────────
function buildCats() {
  const cats = ['all', ...new Set(allProducts.map(p => p.category || 'General'))];
  document.getElementById('cats').innerHTML = cats.map(c =>
    `<button class="cat${activeCat===c?' on':''}" onclick="window._setCat('${esc(c)}')">${c==='all'?'🏷 Todos':esc(c)}</button>`
  ).join('');
}

window._setCat = c => { activeCat = c; buildCats(); applyFilter(); };

// ── FILTER & RENDER ────────────────────────────────────────────────────────
window.applyFilter = function() {
  const q   = document.getElementById('search').value.toLowerCase().trim();
  const cur = config.currency || 'MXN';
  let filtered = allProducts.filter(p => {
    const matchCat = activeCat === 'all' || (p.category||'General') === activeCat;
    const matchQ   = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const catalog = document.getElementById('catalog');
  if (!filtered.length) {
    catalog.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No se encontraron productos.</p></div>`;
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(p => {
    const c = p.category || 'General';
    (groups[c] = groups[c]||[]).push(p);
  });

  let delay = 0;
  catalog.innerHTML = Object.entries(groups).map(([cat, items]) => `
    ${activeCat==='all' ? `<div class="section-head"><h2>${esc(cat)}</h2><div class="section-line"></div></div>` : ''}
    <div class="grid">
      ${items.map(p => `
        <div class="item" style="animation-delay:${delay += .04}s">
          <div class="item-left">
            <div class="item-name">${esc(p.name)}</div>
            ${p.description ? `<div class="item-desc">${esc(p.description)}</div>` : ''}
          </div>
          <div class="item-price">$${fmt(p.price)}<span class="item-cur">${cur}</span></div>
        </div>`).join('')}
    </div>`).join('');
};

function fmt(v){return Number(v).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
