<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>

<title>404 · Página no encontrada</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#faf8f3;font-family:'DM Sans',sans-serif;color:#1e1a14;padding:2rem}
.box{text-align:center;max-width:380px}
.num{font-family:'Cormorant Garamond',serif;font-size:6rem;font-weight:700;color:#2f6b4f;line-height:1}
h1{font-size:1.3rem;font-weight:600;margin:.8rem 0 .5rem}

a{display:inline-block;background:#2f6b4f;color:#fff;border-radius:50px;padding:.65rem 1.6rem;font-weight:600;text-decoration:none;transition:background .18s}

</style>
</head>
<body>
<div class="box">
  <div class="num">404</div>
  <h1>Página no encontrada</h1>
